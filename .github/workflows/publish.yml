name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify exact release tag, package, and CHANGELOG binding
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/verify-release-context.cjs
      - run: npm test
      - name: Publish @aikdna/kdna-activation-server
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@aikdna/kdna-activation-server@$VERSION" version >/dev/null 2>&1; then
            echo "@aikdna/kdna-activation-server@$VERSION is already published; skipping."
            exit 0
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
